server {
    listen 80;
    server_name agentechauth.com api.agentechauth.com poc.agentechauth.com fiload.agentechauth.com ai-azure.agentechauth.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ai-azure.agentechauth.com;

    ssl_certificate /etc/nginx/certs/agentechauth.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/agentechauth.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    resolver 127.0.0.11 ipv6=off valid=10s;

    client_max_body_size 1m;
    proxy_read_timeout 30s;

    location / {
        set $ai_azure_upstream http://floxo-listener:3000;
        proxy_pass $ai_azure_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

server {
    listen 443 ssl;
