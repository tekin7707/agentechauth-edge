server {
    listen 80;
    server_name cwisely.com www.cwisely.com api.cwisely.com opapi.cwisely.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.cwisely.com;

    ssl_certificate /etc/nginx/certs/cwisely.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cwisely.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://cwisely.com$request_uri;
}

server {
    listen 443 ssl;
    server_name cwisely.com;

    ssl_certificate /etc/nginx/certs/cwisely.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cwisely.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    resolver 127.0.0.11 ipv6=off valid=10s;

    client_max_body_size 10m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location = /healthz {
        set $cwisely_api_upstream http://cwisely_api:3000;
        proxy_pass $cwisely_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location = /api/opportunities {
        set $cwisely_opapi_upstream http://cwisely_opapi:3000;
        proxy_pass $cwisely_opapi_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location ^~ /api/opportunities/ {
        set $cwisely_opapi_upstream http://cwisely_opapi:3000;
        proxy_pass $cwisely_opapi_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location ^~ /v1/ {
        set $cwisely_api_upstream http://cwisely_api:3000;
        proxy_pass $cwisely_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location ^~ /api/ {
        set $cwisely_api_upstream http://cwisely_api:3000;
        proxy_pass $cwisely_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location / {
        set $cwisely_web_upstream http://cwisely_web:80;
        proxy_pass $cwisely_web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

